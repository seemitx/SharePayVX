<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 200 48" fill="none">
  <defs>
    <linearGradient id="grad1" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#6366F1;stop-opacity:1" />
      <stop offset="100%" style="stop-color:#8B5CF6;stop-opacity:1" />
    </linearGradient>
    <linearGradient id="grad2" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#06B6D4;stop-opacity:1" />
      <stop offset="100%" style="stop-color:#6366F1;stop-opacity:1" />
    </linearGradient>
  </defs>

  <!-- Icon: overlapping coins / split circle -->
  <circle cx="20" cy="24" r="14" fill="url(#grad1)" opacity="0.9"/>
  <circle cx="32" cy="24" r="14" fill="url(#grad2)" opacity="0.85"/>
  <!-- Intersection highlight -->
  <path d="M26 13.2 A14 14 0 0 1 26 34.8 A14 14 0 0 1 26 13.2 Z" fill="white" opacity="0.15"/>
  <!-- Dollar sign left -->
  <text x="16" y="29" font-family="Arial, sans-serif" font-weight="700" font-size="13" fill="white" text-anchor="middle">$</text>
  <!-- Split line -->
  <line x1="26" y1="13" x2="26" y2="35" stroke="white" stroke-width="1.2" opacity="0.5"/>
  <!-- Percent right -->
  <text x="36" y="29" font-family="Arial, sans-serif" font-weight="700" font-size="11" fill="white" text-anchor="middle">%</text>

  <!-- Wordmark -->
  <text x="56" y="30" font-family="'Segoe UI', Arial, sans-serif" font-weight="700" font-size="20" fill="url(#grad1)">Share</text>
  <text x="113" y="30" font-family="'Segoe UI', Arial, sans-serif" font-weight="700" font-size="20" fill="url(#grad2)">Pay</text>
</svg>
