<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 200 200" fill="none">
  <defs>
    <linearGradient id="g1" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%"   stop-color="#3B82F6"/>
      <stop offset="50%"  stop-color="#8B5CF6"/>
      <stop offset="100%" stop-color="#EC4899"/>
    </linearGradient>
    <linearGradient id="g2" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%"   stop-color="#ffffff" stop-opacity="0.9"/>
      <stop offset="100%" stop-color="#ffffff" stop-opacity="0.6"/>
    </linearGradient>
  </defs>
  <!-- Background circle -->
  <circle cx="100" cy="100" r="96" fill="url(#g1)" opacity="0.15"/>
  <circle cx="100" cy="100" r="88" fill="url(#g1)"/>
  <!-- Split / share icon -->
  <!-- Left coin -->
  <circle cx="72" cy="88" r="24" fill="url(#g2)" opacity="0.95"/>
  <text x="72" y="94" text-anchor="middle" font-size="20" font-weight="700" fill="#3B82F6" font-family="system-ui,sans-serif">฿</text>
  <!-- Right coin -->
  <circle cx="128" cy="88" r="24" fill="url(#g2)" opacity="0.95"/>
  <text x="128" y="94" text-anchor="middle" font-size="20" font-weight="700" fill="#EC4899" font-family="system-ui,sans-serif">฿</text>
  <!-- Arrow between coins -->
  <path d="M96 88 Q100 80 104 88" stroke="white" stroke-width="2.5" stroke-linecap="round" fill="none" opacity="0.9"/>
  <path d="M96 88 Q100 96 104 88" stroke="white" stroke-width="2.5" stroke-linecap="round" fill="none" opacity="0.9"/>
  <!-- SP text -->
  <text x="100" y="140" text-anchor="middle" font-size="22" font-weight="900" fill="white" font-family="system-ui,sans-serif" letter-spacing="-0.5">SharePay</text>
  <text x="100" y="157" text-anchor="middle" font-size="10" fill="white" font-family="system-ui,sans-serif" opacity="0.7" letter-spacing="2">SPLIT · SETTLE</text>
</svg>
